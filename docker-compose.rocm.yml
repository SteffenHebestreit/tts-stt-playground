# ROCm override for AMD GPU support (ROCm 6.2+, tested on RDNA 3/4 including Strix Halo)
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.rocm.yml --profile <profile> up -d
#
# Examples:
#   docker-compose -f docker-compose.yml -f docker-compose.rocm.yml --profile all up -d
#   docker-compose -f docker-compose.yml -f docker-compose.rocm.yml --profile qwen3-asr up -d
#
# Strix Halo (gfx1201 / RDNA 4):
#   gfx1201 is not in ROCm 6.2's official support list; the GFX override makes ROCm
#   treat it as gfx1100 (RDNA 3) which is fully supported and runs correctly on RDNA 4.
#   HSA_OVERRIDE_GFX_VERSION defaults to 11.0.0 here; override in .env if needed.
#
# Shared-memory APU note:
#   Strix Halo uses unified LPDDR5x as both system RAM and VRAM. Set
#   PYTORCH_HIP_ALLOC_CONF to avoid the allocator fragmenting the shared pool.

# Common ROCm environment shared by all services
x-rocm-env: &rocm-env
  NVIDIA_VISIBLE_DEVICES: ""
  NVIDIA_DRIVER_CAPABILITIES: ""
  HIP_VISIBLE_DEVICES: ${HIP_VISIBLE_DEVICES:-0}
  # Default to gfx1100 override for Strix Halo (gfx1201); set to "" in .env to disable
  HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
  # Prevent HIP allocator from fragmenting unified memory on APUs
  PYTORCH_HIP_ALLOC_CONF: ${PYTORCH_HIP_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}

# Common ROCm device passthrough shared by all services
x-rocm-devices: &rocm-devices
  devices:
    - /dev/kfd
    - /dev/dri
  group_add:
    - video
    - render
  deploy:
    resources:
      reservations:
        devices: []

services:
  piper-training-service:
    build:
      dockerfile: Dockerfile.rocm
    environment:
      <<: *rocm-env
    <<: *rocm-devices

  stt-service:
    build:
      dockerfile: Dockerfile.rocm
    environment:
      <<: *rocm-env
      FORCE_ACCELERATION: rocm
    <<: *rocm-devices

  qwen3-asr-service:
    build:
      dockerfile: Dockerfile.rocm
    environment:
      <<: *rocm-env
    <<: *rocm-devices

  qwen3-tts-service:
    build:
      dockerfile: Dockerfile.rocm
    environment:
      <<: *rocm-env
    <<: *rocm-devices
